// iOS install hint
window.addEventListener('load',()=>{
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone;
  if(isIOS&&!isStandalone){
    const d=document.createElement('div');
    d.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0e1220;border:1px solid #272f47;border-radius:10px;padding:10px 16px;font-size:11px;color:#00c896;text-align:center;z-index:9999;white-space:nowrap';

    document.body.appendChild(d);
    setTimeout(()=>d.remove(),5000);
  }
});

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  const d=document.createElement('div');
  d.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0e1220;border:1px solid rgba(0,255,194,.3);border-radius:10px;padding:10px 16px;font-size:12px;color:#00ffc2;z-index:9999;cursor:pointer';
  d.innerHTML='📲 安裝到主畫面';
  d.onclick=()=>{deferredPrompt.prompt();d.remove();};
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),6000);
});

if('serviceWorker' in navigator){
  const sw=`const C='epl-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/'))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

async function load(){
  const gz=APP_GZ_B64;
  function b64ToU8(b){const s=atob(b),u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
  const ds=new DecompressionStream('gzip');
  const w=ds.writable.getWriter();
  w.write(b64ToU8(gz));w.close();
  const r=ds.readable.getReader();
  const chunks=[];
  while(true){const{done,value}=await r.read();if(done)break;chunks.push(value);}
  const total=chunks.reduce((s,c)=>s+c.length,0);
  const merged=new Uint8Array(total);
  let off=0;for(const c of chunks){merged.set(c,off);off+=c.length;}
  const html=new TextDecoder('utf-8').decode(merged);
  document.open('text/html','replace');
  document.write(html);
  document.close();
}
